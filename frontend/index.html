<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Uniqlo Price Tracker Canada — Track Sales &amp; All-Time Low Prices</title>
    <meta name="description" content="Track Uniqlo Canada prices in real time. Browse every item currently on sale, view price history charts, and spot all-time low prices across every category — updated daily." />
    <meta name="keywords" content="Uniqlo price tracker, Uniqlo Canada sale, Uniqlo discount, Uniqlo all-time low, Uniqlo price history, Uniqlo deals Canada" />
    <link rel="canonical" href="https://uniqlotracker.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://uniqlotracker.com/" />
    <meta property="og:site_name" content="Uniqlo Price Tracker" />
    <meta property="og:title" content="Uniqlo Price Tracker Canada — Track Sales &amp; All-Time Low Prices" />
    <meta property="og:description" content="Track Uniqlo Canada prices in real time. Browse every item currently on sale, view price history charts, and spot all-time low prices across every category — updated daily." />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Uniqlo Price Tracker Canada" />
    <meta name="twitter:description" content="Track Uniqlo Canada prices in real time. Spot sales and all-time low prices across every category — updated daily." />

    <!-- Structured data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Uniqlo Price Tracker",
      "url": "https://uniqlotracker.com",
      "description": "A free price tracking tool for Uniqlo Canada. Monitors hundreds of Uniqlo products daily, highlights items currently on sale, tracks full price history, and flags all-time low prices across every category.",
      "applicationCategory": "ShoppingApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "CAD"
      },
      "areaServed": {
        "@type": "Country",
        "name": "Canada"
      },
      "inLanguage": "en-CA",
      "keywords": "Uniqlo price tracker, Uniqlo Canada sale, Uniqlo price history, Uniqlo deals"
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
