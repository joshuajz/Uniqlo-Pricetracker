<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design 7 — Matrix Grid · Categories</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; background: #fcfaf9; }
    [x-cloak] { display: none !important; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body x-data="app()" x-cloak>

  <!-- Navbar -->
  <header class="sticky top-0 z-20 bg-white border-b border-gray-200">
    <div class="max-w-[1100px] mx-auto px-4 sm:px-6 h-[52px] flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-xs font-semibold tracking-widest text-red-600">UNIQLO</span>
        <span class="text-gray-200">|</span>
        <span class="text-xs font-light text-gray-400">Price Tracker</span>
      </div>
      <nav class="flex items-center gap-5">
        <span class="text-xs text-gray-400">Home</span>
        <span class="text-xs font-semibold text-gray-900 border-b-2 border-red-600 pb-0.5">Categories</span>
        <span class="text-xs text-gray-400">Dashboard</span>
      </nav>
    </div>
  </header>

  <div class="max-w-[1100px] mx-auto px-4 sm:px-6 pt-10 pb-16">

    <!-- Design label -->
    <div class="inline-flex items-center gap-2 mb-6 px-3 py-1.5 bg-white border border-gray-200 text-[11px] text-gray-500">
      <span class="font-black text-gray-900">Design 7</span>
      <span class="text-gray-300">·</span>
      <span>Cross-Category Matrix</span>
    </div>

    <div class="mb-8">
      <h1 class="text-[26px] sm:text-[36px] font-black tracking-[-0.03em] leading-none">Browse <span class="text-red-600">Categories</span></h1>
      <p class="text-[13px] text-gray-400 mt-1.5">Rows = type · Columns = gender · Click any cell to browse products</p>
    </div>

    <!-- Legend -->
    <div class="flex items-center gap-4 mb-6 text-[11px] text-gray-400">
      <div class="flex items-center gap-1.5"><div class="w-3 h-3 bg-red-600"></div><span>Has sales</span></div>
      <div class="flex items-center gap-1.5"><div class="w-3 h-3 bg-sky-600"></div><span>Has ATL</span></div>
      <div class="flex items-center gap-1.5"><div class="w-3 h-3 border border-gray-200 bg-white"></div><span>Regular price</span></div>
      <div class="flex items-center gap-1.5"><div class="w-3 h-3 bg-gray-100 border border-dashed border-gray-200"></div><span>Not available</span></div>
    </div>

    <!-- Matrix table -->
    <div class="overflow-x-auto">
      <table class="w-full border-collapse">
        <thead>
          <tr>
            <th class="text-left py-3 pr-6 text-[11px] font-bold tracking-[0.1em] uppercase text-gray-400 w-[180px] border-b-2 border-gray-900">Category type</th>
            <template x-for="col in columns" :key="col">
              <th class="text-center py-3 px-4 text-[11px] font-bold tracking-[0.1em] uppercase border-b-2" :class="col === 'men' ? 'border-red-600' : 'border-gray-900'">
                <span class="capitalize" x-text="col"></span>
              </th>
            </template>
          </tr>
        </thead>
        <tbody>
          <template x-for="(row, ri) in matrix" :key="row.type">
            <tr :class="ri % 2 === 0 ? 'bg-white' : 'bg-stone-50/60'">
              <!-- Row label -->
              <td class="py-3 pr-6 text-[12px] font-semibold text-gray-700 border-b border-gray-100" x-text="row.typeLabel"></td>
              <!-- Cells -->
              <template x-for="col in columns" :key="col">
                <td class="py-2 px-3 border-b border-gray-100 text-center">
                  <template x-if="row.cells[col]">
                    <button
                      @click="selectCell(row.cells[col])"
                      class="w-full min-h-[52px] px-2 py-2 border transition-all duration-150 group"
                      :class="activeCell && activeCell.slug === row.cells[col].slug
                        ? 'bg-gray-900 border-gray-900 text-white'
                        : row.cells[col].saleCount > 0
                          ? 'bg-red-50 border-red-200 hover:border-red-500 hover:bg-red-100'
                          : row.cells[col].atlCount > 0
                            ? 'bg-sky-50 border-sky-200 hover:border-sky-400'
                            : 'bg-white border-gray-200 hover:border-gray-400'"
                    >
                      <div class="text-[13px] font-bold" :class="activeCell && activeCell.slug === row.cells[col].slug ? 'text-white' : 'text-gray-900'" x-text="row.cells[col].products.length"></div>
                      <div class="flex items-center justify-center gap-1 mt-0.5 flex-wrap">
                        <template x-if="row.cells[col].saleCount > 0">
                          <span class="text-[9px] font-bold" :class="activeCell && activeCell.slug === row.cells[col].slug ? 'text-red-400' : 'text-red-600'" x-text="row.cells[col].saleCount+' sale'"></span>
                        </template>
                        <template x-if="row.cells[col].atlCount > 0">
                          <span class="text-[9px] font-bold" :class="activeCell && activeCell.slug === row.cells[col].slug ? 'text-sky-400' : 'text-sky-600'" x-text="row.cells[col].atlCount+' ATL'"></span>
                        </template>
                        <template x-if="row.cells[col].saleCount === 0 && row.cells[col].atlCount === 0">
                          <span class="text-[9px] text-gray-400">–</span>
                        </template>
                      </div>
                    </button>
                  </template>
                  <template x-if="!row.cells[col]">
                    <div class="w-full min-h-[52px] bg-gray-50 border border-dashed border-gray-200 flex items-center justify-center">
                      <span class="text-[10px] text-gray-300">N/A</span>
                    </div>
                  </template>
                </td>
              </template>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <!-- Product zone -->
    <template x-if="activeCell">
      <div class="mt-8 border-t-[3px] border-red-600 pt-6">
        <div class="flex items-center gap-4 mb-5">
          <div>
            <div class="text-[11px] font-bold tracking-[0.12em] uppercase text-gray-400 mb-0.5" x-text="activeCell.slug.split('/')[0].toUpperCase() + ' › ' + activeCell.label.toUpperCase()"></div>
            <div class="flex items-center gap-2">
              <span class="text-[13px] text-gray-400" x-text="activeCell.products.length + ' products'"></span>
              <template x-if="activeCell.saleCount > 0">
                <span class="inline-flex items-center bg-red-700 text-red-100 text-[10px] font-bold px-1.5 py-0.5" x-text="activeCell.saleCount + ' SALE'"></span>
              </template>
              <template x-if="activeCell.atlCount > 0">
                <span class="inline-flex items-center bg-sky-600 text-sky-100 text-[10px] font-bold px-1.5 py-0.5" x-text="activeCell.atlCount + ' ATL'"></span>
              </template>
            </div>
          </div>
          <div class="flex-1"></div>
          <button @click="activeCell = null" class="text-[11px] text-gray-300 hover:text-gray-600">close ×</button>
        </div>
        <template x-if="activeCell.saleProducts.length > 0">
          <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3 mb-4">
            <template x-for="p in activeCell.saleProducts" :key="p.id">
              <div class="bg-white border border-gray-200 overflow-hidden cursor-pointer hover:border-gray-400 hover:shadow-md transition-all">
                <div class="aspect-[4/3] flex items-end p-2" :style="`background:linear-gradient(160deg,hsl(${productHue(p.id)},28%,36%),hsl(${(productHue(p.id)+20)%360},22%,54%))`">
                  <div class="flex gap-1">
                    <span x-show="p.atl" class="bg-sky-600 text-sky-100 text-[10px] font-bold px-1.5 py-0.5">ATL</span>
                    <span class="bg-red-700 text-red-100 text-[10px] font-bold px-1.5 py-0.5">SALE</span>
                  </div>
                </div>
                <div class="px-2.5 pt-2.5 pb-3">
                  <div class="text-xs font-semibold text-gray-900 leading-[1.3] mb-1.5 line-clamp-2" x-text="p.name"></div>
                  <div class="flex items-baseline gap-1.5">
                    <span class="text-sm font-bold" x-text="'$'+p.price.toFixed(2)"></span>
                    <span class="text-[11px] text-gray-300 line-through" x-text="'$'+p.reg.toFixed(2)"></span>
                    <span class="text-[11px] font-bold text-red-600" x-text="'−'+discountPct(p)+'%'"></span>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </template>
        <template x-if="activeCell.regularProducts.length > 0">
          <div>
            <template x-if="activeCell.saleProducts.length > 0">
              <div class="flex items-center gap-3 mb-3">
                <span class="text-[10px] font-bold tracking-[0.12em] uppercase text-gray-400">Regular Price</span>
                <div class="flex-1 border-t border-dashed border-gray-200"></div>
              </div>
            </template>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3">
              <template x-for="p in activeCell.regularProducts" :key="p.id">
                <div class="bg-white border border-gray-200 overflow-hidden cursor-pointer hover:border-gray-400 hover:shadow-md transition-all">
                  <div class="aspect-[4/3] flex items-end p-2" :style="`background:linear-gradient(160deg,hsl(${productHue(p.id)},28%,36%),hsl(${(productHue(p.id)+20)%360},22%,54%))`">
                    <span x-show="p.atl" class="bg-sky-600 text-sky-100 text-[10px] font-bold px-1.5 py-0.5">ATL</span>
                  </div>
                  <div class="px-2.5 pt-2.5 pb-3">
                    <div class="text-xs font-semibold text-gray-900 leading-[1.3] mb-1.5 line-clamp-2" x-text="p.name"></div>
                    <div class="flex items-baseline"><span class="text-sm font-bold" x-text="'$'+p.price.toFixed(2)"></span></div>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </template>

  </div>

<script>
function productHue(id){let h=0;for(const c of id)h=(h*31+c.charCodeAt(0))&0x7fffffff;return h%360;}
function discountPct(p){return Math.round((1-p.price/p.reg)*100);}
const PRODUCTS=[
  {id:'UT001',name:'AIRism Cotton Crew Neck T-Shirt',price:14.90,reg:19.90,cat:'men/tops',sale:true,atl:false},
  {id:'UT002',name:'Dry Stretch Crew Neck T-Shirt',price:19.90,reg:19.90,cat:'men/tops',sale:false,atl:false},
  {id:'UT003',name:'Supima Cotton Crew Neck T-Shirt',price:24.90,reg:29.90,cat:'men/tops',sale:true,atl:true},
  {id:'UT004',name:'U Crew Neck Short Sleeve T-Shirt',price:19.90,reg:19.90,cat:'men/tops',sale:false,atl:false},
  {id:'UT005',name:'Linen Blend V-Neck T-Shirt',price:22.90,reg:29.90,cat:'men/tops',sale:true,atl:false},
  {id:'UB001',name:'Ultra Stretch Jeans Slim Fit',price:39.90,reg:49.90,cat:'men/bottoms',sale:true,atl:false},
  {id:'UB002',name:'Kando Pants Regular Fit',price:44.90,reg:44.90,cat:'men/bottoms',sale:false,atl:false},
  {id:'UB003',name:'Chino Shorts',price:19.90,reg:29.90,cat:'men/bottoms',sale:true,atl:true},
  {id:'UB004',name:'Slim Fit Chino Pants',price:39.90,reg:39.90,cat:'men/bottoms',sale:false,atl:false},
  {id:'UB005',name:'Dry Sweat Wide Fit Pants',price:34.90,reg:39.90,cat:'men/bottoms',sale:true,atl:false},
  {id:'US001',name:'Extra Fine Cotton Broadcloth Shirt',price:29.90,reg:39.90,cat:'men/shirts-and-polo-shirts',sale:true,atl:false},
  {id:'US002',name:'Flannel Long Sleeve Shirt',price:34.90,reg:34.90,cat:'men/shirts-and-polo-shirts',sale:false,atl:false},
  {id:'US003',name:'DRY Piqué Polo Shirt',price:24.90,reg:29.90,cat:'men/shirts-and-polo-shirts',sale:true,atl:true},
  {id:'US004',name:'Supima Cotton Polo Shirt',price:34.90,reg:34.90,cat:'men/shirts-and-polo-shirts',sale:false,atl:false},
  {id:'UO001',name:'Hybrid Down Parka',price:89.90,reg:119.90,cat:'men/outerwear',sale:true,atl:false},
  {id:'UO002',name:'Blocktech Parka',price:99.90,reg:99.90,cat:'men/outerwear',sale:false,atl:false},
  {id:'UO003',name:'Fleece Full-Zip Jacket',price:34.90,reg:49.90,cat:'men/outerwear',sale:true,atl:true},
  {id:'UI001',name:'AIRism Mesh T-Shirt 3-Pack',price:24.90,reg:29.90,cat:'men/innerwear-and-socks',sale:true,atl:false},
  {id:'UI002',name:'HEATTECH Extra Warm Turtleneck',price:22.90,reg:22.90,cat:'men/innerwear-and-socks',sale:false,atl:false},
  {id:'UI003',name:'Ankle Socks 3-Pack',price:9.90,reg:12.90,cat:'men/innerwear-and-socks',sale:true,atl:false},
  {id:'WT001',name:'AIRism UV Protection T-Shirt',price:17.90,reg:22.90,cat:'women/tops',sale:true,atl:false},
  {id:'WT002',name:'Linen Blend Cropped T-Shirt',price:24.90,reg:24.90,cat:'women/tops',sale:false,atl:false},
  {id:'WT003',name:'Cotton Cashmere Turtleneck Sweater',price:49.90,reg:69.90,cat:'women/tops',sale:true,atl:true},
  {id:'WT004',name:'Ribbed Knit Cardigan',price:39.90,reg:39.90,cat:'women/tops',sale:false,atl:false},
  {id:'WT005',name:'Merino Wool Crew Neck Sweater',price:59.90,reg:79.90,cat:'women/tops',sale:true,atl:false},
  {id:'WT006',name:'Satin Camisole Top',price:19.90,reg:19.90,cat:'women/tops',sale:false,atl:false},
  {id:'WB001',name:'Ultra Stretch Leggings Pants',price:24.90,reg:34.90,cat:'women/bottoms',sale:true,atl:false},
  {id:'WB002',name:'Wide Fit Chino Pants',price:39.90,reg:39.90,cat:'women/bottoms',sale:false,atl:false},
  {id:'WB003',name:'Slim Fit Jeans',price:29.90,reg:39.90,cat:'women/bottoms',sale:true,atl:true},
  {id:'WB004',name:'Pleated Wide Shorts',price:29.90,reg:29.90,cat:'women/bottoms',sale:false,atl:false},
  {id:'WD001',name:'Satin Long Skirt',price:34.90,reg:44.90,cat:'women/dresses-and-skirts',sale:true,atl:false},
  {id:'WD002',name:'Rayon Long Cami Dress',price:39.90,reg:39.90,cat:'women/dresses-and-skirts',sale:false,atl:false},
  {id:'WD003',name:'Cotton Boat Neck Dress',price:29.90,reg:39.90,cat:'women/dresses-and-skirts',sale:true,atl:true},
  {id:'WD004',name:'Linen Blend Midi Skirt',price:34.90,reg:34.90,cat:'women/dresses-and-skirts',sale:false,atl:false},
  {id:'WO001',name:'Fluffy Yarn Fleece Jacket',price:44.90,reg:59.90,cat:'women/outerwear',sale:true,atl:false},
  {id:'WO002',name:'Compact Oversized Jacket',price:79.90,reg:79.90,cat:'women/outerwear',sale:false,atl:false},
  {id:'WO003',name:'Down Vest',price:49.90,reg:69.90,cat:'women/outerwear',sale:true,atl:true},
  {id:'WI001',name:'AIRism Ultra Seamless Shorts',price:14.90,reg:19.90,cat:'women/innerwear-and-socks',sale:true,atl:false},
  {id:'WI002',name:'HEATTECH Ultra Warm Turtleneck',price:24.90,reg:24.90,cat:'women/innerwear-and-socks',sale:false,atl:false},
  {id:'KT001',name:'Kids AIRism Crew Neck T-Shirt',price:9.90,reg:12.90,cat:'kids/tops',sale:true,atl:false},
  {id:'KT002',name:'Kids Fleece Crew Neck Sweatshirt',price:19.90,reg:19.90,cat:'kids/tops',sale:false,atl:false},
  {id:'KT003',name:'Kids Graphic Short Sleeve T-Shirt',price:12.90,reg:14.90,cat:'kids/tops',sale:true,atl:true},
  {id:'KB001',name:'Kids Sweatpants',price:14.90,reg:19.90,cat:'kids/bottoms',sale:true,atl:false},
  {id:'KB002',name:'Kids Ultra Stretch Jeans',price:24.90,reg:24.90,cat:'kids/bottoms',sale:false,atl:false},
  {id:'KO001',name:'Kids Hooded Down Jacket',price:39.90,reg:59.90,cat:'kids/outerwear',sale:true,atl:true},
  {id:'KO002',name:'Kids Fleece Full-Zip Jacket',price:24.90,reg:29.90,cat:'kids/outerwear',sale:true,atl:false},
];

function app() {
  // Build a lookup: { 'men/tops': { subs data }, ... }
  const subMap = {};
  for (const p of PRODUCTS) {
    if (!subMap[p.cat]) subMap[p.cat] = { slug: p.cat, label: p.cat.split('/')[1].replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()), products: [] };
    subMap[p.cat].products.push(p);
  }
  for (const key in subMap) {
    const s = subMap[key];
    s.saleProducts = s.products.filter(p => p.sale);
    s.regularProducts = s.products.filter(p => !p.sale);
    s.saleCount = s.saleProducts.length;
    s.atlCount = s.products.filter(p => p.atl).length;
  }

  // Derive unique "types" (sub-path) in order of first appearance
  const typeOrder = [], typeSeen = new Set();
  for (const p of PRODUCTS) {
    const sub = p.cat.split('/')[1];
    if (!typeSeen.has(sub)) { typeOrder.push(sub); typeSeen.add(sub); }
  }

  // Derive columns (main categories)
  const colOrder = [], colSeen = new Set();
  for (const p of PRODUCTS) {
    const main = p.cat.split('/')[0];
    if (!colSeen.has(main)) { colOrder.push(main); colSeen.add(main); }
  }

  // Build matrix rows
  const matrix = typeOrder.map(type => {
    const cells = {};
    for (const col of colOrder) {
      const slug = col + '/' + type;
      cells[col] = subMap[slug] ?? null;
    }
    return { type, typeLabel: type.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()), cells };
  });

  return {
    products: PRODUCTS,
    columns: colOrder,
    matrix,
    activeCell: null,
    selectCell(sub) { this.activeCell = this.activeCell?.slug === sub.slug ? null : sub; },
    productHue,
    discountPct,
  };
}
</script>
</body>
</html>
